version: "3.9"

services:
  backend:
    build: ./backend
    container_name: memex_web_api
    restart: unless-stopped
    volumes:
      - web_data:/app/data
      - ./screenshots:/app/static/screenshots:ro
    environment:
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - SECRET_KEY=${SECRET_KEY:-website_secret_change_me}
      - GITHUB_REPO=${GITHUB_REPO:-}

  frontend:
    build: ./frontend
    container_name: memex_web_frontend
    restart: unless-stopped
    depends_on:
      - backend

  gateway:
    image: nginx:alpine
    container_name: memex_web_gateway
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8047}:${APP_PORT:-8047}"
    volumes:
      - ./nginx/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
    environment:
      - APP_PORT=${APP_PORT:-8047}
    depends_on:
      - backend
      - frontend

volumes:
  web_data:
