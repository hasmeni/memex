<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memex — Documentation</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:radial-gradient(ellipse at center,#1a1a1a 0%,#0a0a0a 60%,#000 100%);color:#e0e0e0;min-height:100vh;display:flex}
/* Particles */
.particle{position:fixed;border-radius:50%;background:#FF7A29;opacity:0.15;filter:blur(0.5px);animation:floatUp linear infinite;pointer-events:none;z-index:0}
@keyframes floatUp{0%{transform:translateY(0) translateX(0);opacity:0}10%{opacity:0.2}90%{opacity:0.1}100%{transform:translateY(-40vh) translateX(20px);opacity:0}}

/* Ambient glow */
body::before{content:'';position:fixed;width:70vmin;height:70vmin;border-radius:50%;background:radial-gradient(circle,rgba(255,122,41,0.08) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;animation:drift 14s ease-in-out infinite;z-index:0}
@keyframes drift{0%{transform:translate(calc(-50% - 2%),calc(-50% - 1%)) scale(1)}50%{transform:translate(calc(-50% + 2%),calc(-50% + 1.5%)) scale(1.08)}100%{transform:translate(calc(-50% - 2%),calc(-50% - 1%)) scale(1)}}

.sidebar{width:260px;min-height:100vh;background:rgba(10,10,10,0.9);border-right:1px solid rgba(255,122,41,0.1);padding:24px 16px;position:fixed;left:0;top:0;overflow-y:auto;z-index:2;backdrop-filter:blur(8px)}
.sidebar-logo{font-family:'Caveat',cursive;font-size:24px;color:#FF7A29;font-weight:700;margin-bottom:4px}
.sidebar-sub{font-size:11px;color:rgba(255,163,92,0.5);margin-bottom:24px}
.sidebar a{display:block;padding:8px 12px;color:#FFA35C;text-decoration:none;font-size:13px;border-radius:8px;margin-bottom:2px;transition:all 0.15s}
.sidebar a:hover,.sidebar a.active{background:rgba(255,122,41,0.1);color:#fff}
.sidebar-back{margin-top:20px;padding-top:16px;border-top:1px solid rgba(255,122,41,0.1)}
.sidebar-back a{color:rgba(255,163,92,0.4);font-size:12px}

.content{margin-left:260px;flex:1;padding:40px 48px 80px;max-width:800px;position:relative;z-index:1}
.content h1{font-family:'Caveat',cursive;font-size:36px;color:#FF7A29;margin-bottom:8px}
.content h2{font-family:'Caveat',cursive;font-size:26px;color:#FFA35C;margin-top:32px;margin-bottom:12px}
.content h3{font-size:16px;color:#FFA35C;margin-top:20px;margin-bottom:8px}
.content p{margin-bottom:12px;line-height:1.7;color:#bbb;font-size:14px}
.content code{background:rgba(255,122,41,0.1);padding:2px 6px;border-radius:4px;font-size:13px;color:#FFA35C}
.content pre{background:rgba(255,122,41,0.04);border:1px solid rgba(255,122,41,0.15);border-radius:12px;padding:16px;overflow-x:auto;margin:12px 0;font-size:13px;color:#ddd}
.content ul,.content ol{margin:8px 0 12px 20px;color:#bbb;font-size:14px}
.content a{color:#FF7A29}
.content table{width:100%;border-collapse:collapse;margin:12px 0}
.content th,.content td{padding:8px 12px;border:1px solid rgba(255,122,41,0.12);text-align:left;font-size:13px}
.content th{background:rgba(255,122,41,0.08);color:#FFA35C}
.updated{font-size:11px;color:rgba(255,255,255,0.3);margin-bottom:24px}
.loading{color:#FFA35C;font-size:14px;padding:40px 0}

@media(max-width:768px){
  .sidebar{width:100%;position:relative;min-height:auto;border-right:none;border-bottom:1px solid rgba(255,122,41,0.1)}
  body{flex-direction:column}
  .content{margin-left:0;padding:24px 20px}
}
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-logo">Memex</div>
  <div class="sidebar-sub">Documentation</div>
  <div id="page-list"><div class="loading">Loading...</div></div>
  <div class="sidebar-back"><a href="/">← Back to site</a></div>
</div>

<div class="content" id="content">
  <div class="loading">Select a page from the sidebar.</div>
</div>

<script>
// Particles
for(let i=0;i<12;i++){const p=document.createElement('div');p.className='particle';const s=2+Math.random()*2;p.style.cssText=`width:${s}px;height:${s}px;left:${Math.random()*100}vw;top:${60+Math.random()*40}vh`;const d=14+Math.random()*12;p.style.animationDuration=d+'s';p.style.animationDelay=(Math.random()*d)+'s';document.body.appendChild(p)}

let pages=[];

async function loadPages(){
  try{
    pages=await fetch('/api/wiki').then(r=>r.json());
    const list=document.getElementById('page-list');
    list.innerHTML=pages.map(p=>`<a href="#" onclick="loadPage('${p.slug}');return false;" id="nav-${p.slug}">${p.title}</a>`).join('');
    // Load first page or from hash
    const hash=window.location.hash.slice(1);
    if(hash&&pages.find(p=>p.slug===hash)){loadPage(hash)}
    else if(pages.length){loadPage(pages[0].slug)}
  }catch(e){document.getElementById('page-list').innerHTML='<div style="color:#f87171;font-size:12px">Error loading pages</div>'}
}

async function loadPage(slug){
  try{
    const page=await fetch(`/api/wiki/${slug}`).then(r=>r.json());
    const html=marked.parse(page.body||'');
    document.getElementById('content').innerHTML=`<h1>${page.title}</h1><div class="updated">Last updated: ${page.updated_at||'—'}</div>${html}`;
    document.title=`${page.title} — Memex Docs`;
    window.location.hash=slug;
    // Highlight active
    document.querySelectorAll('.sidebar a').forEach(a=>a.classList.remove('active'));
    const nav=document.getElementById(`nav-${slug}`);
    if(nav)nav.classList.add('active');
  }catch(e){document.getElementById('content').innerHTML='<div style="color:#f87171">Page not found</div>'}
}

loadPages();
</script>
</body>
</html>
