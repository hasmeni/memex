<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memex Website — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:radial-gradient(ellipse at center,#1a1a1a 0%,#0a0a0a 60%,#000 100%);color:#fff;min-height:100vh;padding:32px 20px}
.container{max-width:800px;margin:0 auto}
h1{font-family:'Caveat',cursive;font-size:32px;color:#FF7A29;margin-bottom:4px}
h2{font-family:'Caveat',cursive;font-size:24px;color:#FFA35C;margin-top:32px;margin-bottom:12px}
.subtitle{font-size:12px;color:rgba(255,163,92,0.5);margin-bottom:24px}
input,textarea,select{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,122,41,0.25);border-radius:10px;padding:10px 14px;color:#fff;font-family:'Inter',sans-serif;font-size:14px;outline:none;margin-bottom:10px}
input:focus,textarea:focus{border-color:#FF7A29}
textarea{min-height:120px;resize:vertical}
label{font-size:12px;color:#FFA35C;display:block;margin-bottom:4px}
.btn{padding:8px 18px;border-radius:10px;border:none;cursor:pointer;font-size:13px;font-weight:500;transition:all 0.2s}
.btn-primary{background:#FF7A29;color:#000}
.btn-primary:hover{background:#FFA35C}
.btn-ghost{background:rgba(255,122,41,0.08);border:1px solid rgba(255,122,41,0.3);color:#FFA35C}
.btn-ghost:hover{background:rgba(255,122,41,0.2)}
.btn-danger{background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.3);color:#f87171}
.card{background:rgba(255,122,41,0.04);border:1px solid rgba(255,122,41,0.15);border-radius:16px;padding:20px;margin-bottom:20px;backdrop-filter:blur(6px)}
.row{display:flex;gap:8px;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,122,41,0.08)}
.row:last-child{border-bottom:none}
#login{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;gap:12px}
.login-box{background:rgba(255,122,41,0.05);border:1px solid rgba(255,122,41,0.2);border-radius:18px;padding:28px;width:100%;max-width:340px}
#admin{display:none}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:rgba(10,10,10,0.9);border:1px solid rgba(255,122,41,0.4);border-radius:10px;padding:8px 20px;font-size:13px;color:#FFA35C;transition:transform 0.3s;z-index:99}
#toast.show{transform:translateX(-50%) translateY(0)}
.tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.tab{padding:6px 14px;border-radius:10px;border:1px solid rgba(255,122,41,0.2);background:transparent;color:#FFA35C;cursor:pointer;font-size:12px;font-family:'Inter',sans-serif}
.tab.active{background:rgba(255,122,41,0.15);border-color:#FF7A29;color:#fff}
.tab-content{display:none}
.tab-content.active{display:block}
</style>
</head>
<body>
<div class="container">

<div id="login">
  <h1>Memex</h1>
  <div class="subtitle">Website Admin</div>
  <div class="login-box">
    <label>Password</label>
    <input type="password" id="login-pass" placeholder="Admin password">
    <button class="btn btn-primary" style="width:100%;margin-top:8px" onclick="doLogin()">Sign In</button>
  </div>
</div>

<div id="admin">
  <h1>Memex <span style="font-size:14px;color:rgba(255,163,92,0.5);font-family:Inter">website admin</span></h1>
  <div style="margin-bottom:20px"><a href="/" style="color:rgba(255,122,41,0.4);font-size:12px;text-decoration:none">← view site</a></div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('content')">Content</button>
    <button class="tab" onclick="switchTab('wiki')">Wiki Pages</button>
  </div>

  <div id="tab-content" class="tab-content active">
    <div class="card">
      <h2>Hero Section</h2>
      <label>Title</label><input id="c-hero_title">
      <label>Subtitle</label><input id="c-hero_subtitle">
      <label>CTA Button Text</label><input id="c-hero_cta">
      <label>CTA URL</label><input id="c-hero_cta_url">
    </div>
    <div class="card">
      <h2>Features (JSON array)</h2>
      <textarea id="c-features" rows="6"></textarea>
    </div>
    <div class="card">
      <h2>Screenshots (JSON array of paths)</h2>
      <textarea id="c-screenshots" rows="4"></textarea>
    </div>
    <div class="card">
      <h2>Footer</h2>
      <input id="c-footer_text">
    </div>
    <button class="btn btn-primary" onclick="saveAllContent()">Save All Content</button>
  </div>

  <div id="tab-wiki" class="tab-content">
    <div class="card">
      <h2>Wiki Pages</h2>
      <div id="wiki-list"></div>
    </div>
    <div class="card">
      <h2 id="wiki-form-title">Add Page</h2>
      <input type="hidden" id="wiki-edit-id">
      <label>Slug</label><input id="w-slug" placeholder="my-page">
      <label>Title</label><input id="w-title" placeholder="Page Title">
      <label>Content (Markdown)</label><textarea id="w-body" rows="10"></textarea>
      <label>Sort Order</label><input id="w-order" type="number" value="0">
      <div style="margin-top:10px;display:flex;gap:8px">
        <button class="btn btn-primary" onclick="saveWikiPage()">Save Page</button>
        <button class="btn btn-ghost" onclick="resetWikiForm()">Cancel</button>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const API='/api';
let token=localStorage.getItem('memex_web_token');

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}

async function doLogin(){
  const pass=document.getElementById('login-pass').value;
  try{
    const res=await fetch(`${API}/auth/token`,{method:'POST',body:new URLSearchParams({username:'admin',password:pass})});
    if(!res.ok)throw new Error('Invalid');
    const d=await res.json();token=d.access_token;localStorage.setItem('memex_web_token',token);showAdmin();
  }catch(e){toast('Invalid credentials')}
}
document.getElementById('login-pass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});

function showAdmin(){document.getElementById('login').style.display='none';document.getElementById('admin').style.display='block';loadContent();loadWikiPages()}
if(token)showAdmin();

async function api(path,method='GET',body=null){
  const opts={method,headers:{Authorization:`Bearer ${token}`,'Content-Type':'application/json'}};
  if(body)opts.body=JSON.stringify(body);
  const res=await fetch(`${API}${path}`,opts);
  if(res.status===401){localStorage.removeItem('memex_web_token');location.reload()}
  return res.json();
}

// Tabs
function switchTab(tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById(`tab-${tab}`).classList.add('active');
}

// Content
const contentKeys=['hero_title','hero_subtitle','hero_cta','hero_cta_url','features','screenshots','footer_text'];
async function loadContent(){
  const data=await fetch(`${API}/content`).then(r=>r.json());
  contentKeys.forEach(k=>{const el=document.getElementById(`c-${k}`);if(el)el.value=data[k]||''});
}
async function saveAllContent(){
  for(const k of contentKeys){
    const el=document.getElementById(`c-${k}`);
    if(el)await api(`/admin/content/${k}`,'PUT',{value:el.value});
  }
  toast('Content saved ✓');
}

// Wiki
async function loadWikiPages(){
  const pages=await api('/admin/wiki');
  document.getElementById('wiki-list').innerHTML=pages.length?pages.map(p=>`<div class="row"><span style="flex:1;color:#FFA35C">${p.title} <span style="color:rgba(255,255,255,0.3);font-size:11px">/${p.slug}</span></span><button class="btn btn-ghost" style="padding:4px 10px;font-size:11px" onclick="editWiki(${p.id})">Edit</button><button class="btn btn-danger" style="padding:4px 10px;font-size:11px" onclick="deleteWiki(${p.id})">Del</button></div>`).join(''):'<div style="color:rgba(255,255,255,0.3);font-size:13px">No pages yet</div>';
}
async function editWiki(id){
  const pages=await api('/admin/wiki');
  const page=pages.find(p=>p.id===id);
  if(!page)return;
  // Fetch full page
  const full=await fetch(`${API}/wiki/${page.slug}`).then(r=>r.json());
  document.getElementById('wiki-edit-id').value=id;
  document.getElementById('wiki-form-title').textContent='Edit Page';
  document.getElementById('w-slug').value=full.slug;
  document.getElementById('w-title').value=full.title;
  document.getElementById('w-body').value=full.body;
  document.getElementById('w-order').value=page.sort_order||0;
}
async function saveWikiPage(){
  const id=document.getElementById('wiki-edit-id').value;
  const payload={slug:document.getElementById('w-slug').value.trim(),title:document.getElementById('w-title').value.trim(),body:document.getElementById('w-body').value,sort_order:parseInt(document.getElementById('w-order').value)||0,published:true};
  if(!payload.slug||!payload.title){toast('Slug and title required');return}
  if(id){await api(`/admin/wiki/${id}`,'PUT',payload);toast('Page updated ✓')}
  else{await api('/admin/wiki','POST',payload);toast('Page created ✓')}
  resetWikiForm();loadWikiPages();
}
async function deleteWiki(id){if(!confirm('Delete this page?'))return;await api(`/admin/wiki/${id}`,'DELETE');toast('Deleted');loadWikiPages()}
function resetWikiForm(){document.getElementById('wiki-edit-id').value='';document.getElementById('wiki-form-title').textContent='Add Page';document.getElementById('w-slug').value='';document.getElementById('w-title').value='';document.getElementById('w-body').value='';document.getElementById('w-order').value='0'}
</script>
</body>
</html>
