<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memex — Personal Link Mind Map</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:radial-gradient(ellipse at center,#1a1a1a 0%,#0a0a0a 60%,#000 100%);color:#fff;min-height:100vh;overflow-x:hidden}

/* Ambient glow */
body::before{content:'';position:fixed;width:70vmin;height:70vmin;border-radius:50%;background:radial-gradient(circle,rgba(255,122,41,0.1) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;animation:drift 14s ease-in-out infinite;z-index:0}
@keyframes drift{0%{transform:translate(calc(-50% - 2%),calc(-50% - 1%)) scale(1)}50%{transform:translate(calc(-50% + 2%),calc(-50% + 1.5%)) scale(1.08)}100%{transform:translate(calc(-50% - 2%),calc(-50% - 1%)) scale(1)}}

.particle{position:fixed;border-radius:50%;background:#FF7A29;opacity:0.2;filter:blur(0.5px);animation:floatUp linear infinite;pointer-events:none;z-index:0}
@keyframes floatUp{0%{transform:translateY(0) translateX(0);opacity:0}10%{opacity:0.25}90%{opacity:0.15}100%{transform:translateY(-40vh) translateX(20px);opacity:0}}

/* Mind map hero background */
#hero-map{position:absolute;inset:0;z-index:0;opacity:0.3;pointer-events:none}
#hero-map svg{width:100%;height:100%}

.container{max-width:1000px;margin:0 auto;padding:0 20px;position:relative;z-index:1}
nav{display:flex;align-items:center;justify-content:space-between;padding:20px 0}
.nav-logo{font-family:'Caveat',cursive;font-size:28px;color:#FF7A29;font-weight:700}
.nav-links{display:flex;gap:20px;align-items:center}
.nav-links a{color:#FFA35C;text-decoration:none;font-size:13px;transition:color 0.2s}
.nav-links a:hover{color:#fff}
.gh-stars{display:flex;align-items:center;gap:6px;background:rgba(255,122,41,0.08);border:1px solid rgba(255,122,41,0.25);border-radius:20px;padding:4px 12px;font-size:12px;color:#FFA35C;text-decoration:none;transition:all 0.2s}
.gh-stars:hover{background:rgba(255,122,41,0.15);border-color:#FF7A29}

.hero{text-align:center;padding:100px 0 80px;position:relative}
.hero h1{font-family:'Caveat',cursive;font-size:68px;color:#FF7A29;font-weight:700;line-height:1.1;text-shadow:0 0 40px rgba(255,122,41,0.3)}
.hero p{font-size:18px;color:#bbb;margin-top:12px;max-width:500px;margin-left:auto;margin-right:auto}
.hero-cta{display:inline-block;margin-top:28px;padding:14px 32px;background:#FF7A29;color:#000;border-radius:12px;font-weight:600;font-size:15px;text-decoration:none;transition:all 0.2s;box-shadow:0 4px 20px rgba(255,122,41,0.3)}
.hero-cta:hover{background:#FFA35C;transform:translateY(-2px);box-shadow:0 8px 30px rgba(255,122,41,0.4)}

.features{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;padding:60px 0}
.feature-card{background:rgba(255,122,41,0.04);border:1px solid rgba(255,122,41,0.15);border-radius:16px;padding:24px;backdrop-filter:blur(6px);transition:all 0.2s}
.feature-card:hover{border-color:rgba(255,122,41,0.4);transform:translateY(-3px);box-shadow:0 8px 24px rgba(255,122,41,0.1)}
.feature-icon{font-size:28px;margin-bottom:12px}
.feature-title{font-family:'Caveat',cursive;font-size:22px;color:#FFA35C;font-weight:700}
.feature-desc{font-size:13px;color:#999;margin-top:6px;line-height:1.5}

.screenshots{padding:60px 0;overflow:hidden}
.screenshots h2{font-family:'Caveat',cursive;font-size:36px;color:#FF7A29;text-align:center;margin-bottom:28px}
.screenshot-marquee{display:flex;gap:16px;animation:marqueeScroll 30s linear infinite;width:max-content}
.screenshot-marquee:hover{animation-play-state:paused}
@keyframes marqueeScroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.screenshot-card{flex-shrink:0;width:340px;background:rgba(10,10,10,0.7);border:1px solid rgba(255,122,41,0.2);border-radius:16px;overflow:hidden;transition:all 0.3s;position:relative}
.screenshot-card:hover{border-color:#FF7A29;box-shadow:0 8px 30px rgba(255,122,41,0.15)}
.screenshot-card::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at top right,rgba(255,122,41,0.05),transparent);pointer-events:none}
.screenshot-card img{width:100%;display:block}

.footer{text-align:center;padding:40px 0;border-top:1px solid rgba(255,122,41,0.1);margin-top:60px;color:rgba(255,163,92,0.4);font-size:12px}

@media(max-width:640px){
  .hero h1{font-size:42px}
  .hero p{font-size:15px}
  .nav-links{gap:12px}
  .features{grid-template-columns:1fr}
  .screenshot-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- Decorative mind map background -->
<div id="hero-map"></div>

<div class="container">
  <nav>
    <div class="nav-logo">Memex</div>
    <div class="nav-links">
      <a href="/wiki.html">Docs</a>
      <a href="#features">Features</a>
      <a href="#screenshots">Screenshots</a>
      <a id="gh-link" href="#" target="_blank" class="gh-stars">⭐ <span id="star-count">—</span> GitHub</a>
    </div>
  </nav>

  <section class="hero">
    <h1 id="hero-title">Memex</h1>
    <p id="hero-subtitle">Your personal link collection, visualized as a mind map.</p>
    <a id="hero-cta" class="hero-cta" href="#">View on GitHub</a>
  </section>

  <section class="features" id="features"></section>

  <section class="screenshots" id="screenshots">
    <h2>Screenshots</h2>
    <div class="screenshot-marquee" id="screenshot-marquee"></div>
  </section>

  <footer class="footer">
    <span id="footer-text">Built by ironyLabs</span>
  </footer>
</div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
// Particles
for(let i=0;i<22;i++){const p=document.createElement('div');p.className='particle';const s=2+Math.random()*3;p.style.cssText=`width:${s}px;height:${s}px;left:${Math.random()*100}vw;top:${60+Math.random()*40}vh`;const d=12+Math.random()*14;p.style.animationDuration=d+'s';p.style.animationDelay=(Math.random()*d)+'s';document.body.appendChild(p)}

// Decorative mind map in hero
(function(){
  const W=window.innerWidth,H=600;
  const svg=d3.select('#hero-map').append('svg').attr('width',W).attr('height',H);
  const nodes=[{id:0,x:W/2,y:H/2}];
  const edges=[];
  for(let i=1;i<=8;i++){
    const angle=(i/8)*Math.PI*2;
    const r=120+Math.random()*80;
    nodes.push({id:i,x:W/2+Math.cos(angle)*r,y:H/2+Math.sin(angle)*r});
    edges.push({source:0,target:i});
    for(let j=0;j<2;j++){
      const leafId=nodes.length;
      const la=angle+(Math.random()-0.5)*0.8;
      const lr=r+60+Math.random()*50;
      nodes.push({id:leafId,x:W/2+Math.cos(la)*lr,y:H/2+Math.sin(la)*lr});
      edges.push({source:i,target:leafId});
    }
  }
  svg.selectAll('line').data(edges).join('line')
    .attr('x1',d=>nodes[d.source].x).attr('y1',d=>nodes[d.source].y)
    .attr('x2',d=>nodes[d.target].x).attr('y2',d=>nodes[d.target].y)
    .attr('stroke','#FF7A29').attr('stroke-width',0.8).attr('stroke-opacity',0.3);
  svg.selectAll('circle').data(nodes).join('circle')
    .attr('cx',d=>d.x).attr('cy',d=>d.y)
    .attr('r',d=>d.id===0?12:d.id<=8?8:5)
    .attr('fill',d=>d.id===0?'#FF7A29':'rgba(255,122,41,0.4)')
    .attr('opacity',0.6);
})();

// Load content
async function loadContent(){
  try{
    const data=await fetch('/api/content').then(r=>r.json());
    if(data.hero_title)document.getElementById('hero-title').textContent=data.hero_title;
    if(data.hero_subtitle)document.getElementById('hero-subtitle').textContent=data.hero_subtitle;
    if(data.hero_cta)document.getElementById('hero-cta').textContent=data.hero_cta;
    if(data.hero_cta_url)document.getElementById('hero-cta').href=data.hero_cta_url;
    if(data.footer_text)document.getElementById('footer-text').textContent=data.footer_text;
    if(data.features){
      const features=JSON.parse(data.features);
      document.getElementById('features').innerHTML=features.map(f=>`<div class="feature-card"><div class="feature-icon">${f.icon}</div><div class="feature-title">${f.title}</div><div class="feature-desc">${f.desc}</div></div>`).join('');
    }
    if(data.screenshots){
      const shots=JSON.parse(data.screenshots);
      // Duplicate for seamless infinite scroll
      const doubled = [...shots, ...shots];
      document.getElementById('screenshot-marquee').innerHTML=doubled.map(s=>`<div class="screenshot-card"><img src="/api/static/${s}" alt="Screenshot" loading="lazy"></div>`).join('');
    }
  }catch(e){console.warn('Content load error',e)}
}

// GitHub stars
async function loadStars(){
  try{
    const info=await fetch('/api/github-stars').then(r=>r.json());
    if(!info.repo)return;
    const gh=await fetch(`https://api.github.com/repos/${info.repo}`).then(r=>r.json());
    document.getElementById('star-count').textContent=gh.stargazers_count||'0';
    document.getElementById('gh-link').href=`https://github.com/${info.repo}`;
    if(!document.getElementById('hero-cta').href||document.getElementById('hero-cta').href.endsWith('#'))
      document.getElementById('hero-cta').href=`https://github.com/${info.repo}`;
  }catch(e){}
}

loadContent();
loadStars();
</script>
</body>
</html>
