<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ironyLabs · Memex</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ── Reset & Base ──────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0a;
  --accent: #FF7A29;
  --accent-light: #FFA35C;
  --text: #ffffff;
  --glow-color: rgba(255,122,41,0.12);
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: radial-gradient(ellipse at center, #1a1a1a 0%, var(--bg) 60%, #000 100%);
  font-family: 'Inter', sans-serif;
  color: var(--text);
}

/* ── Wallpaper Layer ───────────────────────────────────────────────────────── */
#wallpaper {
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 0;
}

.ambient-glow {
  position: absolute;
  width: 70vmin; height: 70vmin;
  border-radius: 50%;
  background: radial-gradient(circle, var(--glow-color) 0%, rgba(255,122,41,0) 70%);
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  animation: drift 14s ease-in-out infinite;
}

@keyframes drift {
  0%   { transform: translate(calc(-50% - 2%), calc(-50% - 1%)) scale(1); }
  50%  { transform: translate(calc(-50% + 2%), calc(-50% + 1.5%)) scale(1.08); }
  100% { transform: translate(calc(-50% - 2%), calc(-50% - 1%)) scale(1); }
}

.particle {
  position: absolute;
  border-radius: 50%;
  background: #FF7A29;
  opacity: 0.25;
  filter: blur(0.5px);
  animation: floatUp linear infinite;
}

@keyframes floatUp {
  0%   { transform: translateY(0) translateX(0); opacity: 0; }
  10%  { opacity: 0.35; }
  90%  { opacity: 0.2; }
  100% { transform: translateY(-40vh) translateX(20px); opacity: 0; }
}

/* ── Mind Map Canvas ───────────────────────────────────────────────────────── */
#mindmap-canvas {
  position: fixed; inset: 0;
  z-index: 1;
}

#mindmap-canvas svg {
  width: 100%; height: 100%;
}

/* ── Link node tooltip ─────────────────────────────────────────────────────── */
#node-tooltip {
  position: fixed;
  background: rgba(10,10,10,0.92);
  border: 1px solid rgba(255,122,41,0.5);
  border-radius: 12px;
  padding: 10px 14px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.2s ease;
  z-index: 20;
  max-width: 220px;
  backdrop-filter: blur(8px);
}
#node-tooltip.visible { opacity: 1; }
#node-tooltip .tt-title {
  font-family: 'Caveat', cursive;
  font-size: 18px;
  color: #FF7A29;
  font-weight: 700;
}
#node-tooltip .tt-desc {
  font-size: 11px;
  color: #aaa;
  margin-top: 3px;
  line-height: 1.4;
}
#node-tooltip .tt-url {
  font-size: 10px;
  color: #FFA35C;
  margin-top: 4px;
  opacity: 0.7;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ── Category filter bar ───────────────────────────────────────────────────── */
#cat-bar {
  position: fixed;
  top: 18px; left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
  padding: 0 16px;
  max-width: 100vw;
}

.cat-btn {
  background: rgba(255,122,41,0.08);
  border: 1px solid rgba(255,122,41,0.3);
  color: #FFA35C;
  border-radius: 20px;
  padding: 5px 14px;
  font-size: 12px;
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  transition: all 0.2s ease;
  backdrop-filter: blur(6px);
  white-space: nowrap;
}
.cat-btn:hover, .cat-btn.active {
  background: rgba(255,122,41,0.22);
  border-color: #FF7A29;
  color: #fff;
}

/* ── Corner branding ───────────────────────────────────────────────────────── */
.corner-tag {
  position: fixed;
  bottom: 22px; right: 28px;
  font-family: 'Caveat', cursive;
  font-size: 20px;
  color: #FF7A29;
  opacity: 0.45;
  z-index: 5;
  letter-spacing: 0.5px;
}

/* ── Admin link ────────────────────────────────────────────────────────────── */
.admin-link {
  position: fixed;
  bottom: 22px; left: 28px;
  font-size: 11px;
  color: rgba(255,122,41,0.3);
  z-index: 5;
  text-decoration: none;
  transition: color 0.2s;
  font-family: 'Inter', sans-serif;
}
.admin-link:hover { color: rgba(255,122,41,0.7); }

/* ── Mobile card grid ──────────────────────────────────────────────────────── */
#mobile-grid {
  display: none;
  position: fixed; inset: 0;
  z-index: 15;
  overflow-y: auto;
  padding: 60px 16px 80px;
}

.mobile-logo {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 24px;
  padding-top: 50px;
}

.mobile-logo svg { width: 120px; height: 120px; }

.mobile-logo-title {
  font-family: 'Caveat', cursive;
  font-size: 28px;
  color: #FF7A29;
  font-weight: 700;
  margin-top: 8px;
}

.mobile-logo-sub {
  font-size: 12px;
  color: #FFA35C;
  opacity: 0.8;
  letter-spacing: 1px;
}

/* Sticky category bar */
#mobile-cat-bar {
  position: sticky;
  top: 0;
  z-index: 17;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
  padding: 12px 0;
  margin-bottom: 12px;
  background: rgba(10,10,10,0.9);
  backdrop-filter: blur(8px);
  border-bottom: 1px solid rgba(255,122,41,0.1);
}

/* Sort toggle */
#mobile-sort-bar {
  display: flex;
  justify-content: center;
  gap: 6px;
  margin-bottom: 14px;
}
.sort-btn {
  font-size: 10px;
  padding: 4px 10px;
  border-radius: 12px;
  border: 1px solid rgba(255,122,41,0.2);
  background: rgba(255,122,41,0.05);
  color: rgba(255,163,92,0.6);
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  -webkit-tap-highlight-color: transparent;
}
.sort-btn.active {
  background: rgba(255,122,41,0.15);
  border-color: rgba(255,122,41,0.5);
  color: #FFA35C;
}

.link-cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 12px;
}

.link-card {
  background: rgba(255,122,41,0.06);
  border: 1px solid rgba(255,122,41,0.2);
  border-radius: 16px;
  padding: 16px 12px;
  text-decoration: none;
  color: #fff;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  text-align: center;
  transition: all 0.2s ease;
  backdrop-filter: blur(6px);
  -webkit-tap-highlight-color: transparent;
}
.link-card:active {
  background: rgba(255,122,41,0.18);
  border-color: #FF7A29;
  transform: scale(0.96);
}

.link-card-icon {
  font-size: 28px;
  line-height: 1;
}

.link-card-title {
  font-family: 'Caveat', cursive;
  font-size: 16px;
  color: #FFA35C;
  font-weight: 700;
  line-height: 1.2;
}

.link-card-cat {
  font-size: 10px;
  color: rgba(255,163,92,0.5);
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

/* Show More button */
#mobile-show-more {
  display: none;
  width: 100%;
  padding: 12px;
  margin-top: 14px;
  border-radius: 14px;
  border: 1px solid rgba(255,122,41,0.25);
  background: rgba(255,122,41,0.06);
  color: #FFA35C;
  font-size: 13px;
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  text-align: center;
  -webkit-tap-highlight-color: transparent;
}
#mobile-show-more:active {
  background: rgba(255,122,41,0.15);
}

/* Alpha jump nav */
#alpha-nav {
  position: fixed;
  right: 4px;
  top: 50%;
  transform: translateY(-50%);
  z-index: 18;
  display: none;
  flex-direction: column;
  gap: 1px;
  padding: 4px 2px;
}
#alpha-nav span {
  font-size: 9px;
  color: rgba(255,122,41,0.5);
  text-align: center;
  padding: 1px 4px;
  cursor: pointer;
  border-radius: 3px;
  -webkit-tap-highlight-color: transparent;
}
#alpha-nav span:active,
#alpha-nav span.active {
  background: rgba(255,122,41,0.2);
  color: #FF7A29;
}

@media (max-width: 640px) {
  #alpha-nav { display: flex; }
}

/* ── Mobile tag/collection bars ────────────────────────────────────────────── */
#mobile-tag-bar, #mobile-collections-bar {
  display: none;
  flex-wrap: wrap;
  gap: 6px;
  justify-content: center;
  margin-bottom: 12px;
  padding: 0 8px;
}
#mobile-tag-bar .tag-pill, #mobile-collections-bar .col-pill {
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 12px;
  border: 1px solid rgba(255,122,41,0.25);
  background: rgba(255,122,41,0.06);
  color: var(--accent-light);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
#mobile-tag-bar .tag-pill.active, #mobile-collections-bar .col-pill.active {
  background: rgba(255,122,41,0.2);
  border-color: var(--accent);
  color: #fff;
}

/* QR Code modal */
#qr-modal {
  position: fixed; inset: 0;
  z-index: 120;
  display: none;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.8);
  backdrop-filter: blur(4px);
}
#qr-modal.open { display: flex; }
#qr-modal .qr-content {
  background: #fff;
  border-radius: 18px;
  padding: 28px;
  text-align: center;
  max-width: 280px;
}
#qr-modal .qr-title {
  font-family: 'Caveat', cursive;
  font-size: 20px;
  color: #333;
  margin-top: 12px;
}
#qr-modal .qr-url {
  font-size: 11px;
  color: #666;
  margin-top: 4px;
  word-break: break-all;
}
#qr-modal .qr-close {
  margin-top: 16px;
  padding: 8px 20px;
  border-radius: 10px;
  border: none;
  background: #FF7A29;
  color: #fff;
  font-size: 13px;
  cursor: pointer;
}

/* ── Responsive ────────────────────────────────────────────────────────────── */
@media (max-width: 640px) {
  #mindmap-canvas { display: none !important; }
  #pinboard-view { display: none !important; }
  #tagcloud-view { display: none !important; }
  #link-of-day { display: none !important; }
  #site-header-strip { display: none !important; }
  #cat-bar { display: none; }
  #mobile-grid { display: block; }
}

/* ── Search Overlay ────────────────────────────────────────────────────────── */
#search-overlay {
  position: fixed; inset: 0;
  z-index: 100;
  display: none;
  align-items: flex-start;
  justify-content: center;
  padding-top: 15vh;
}
#search-overlay.open { display: flex; }

.search-backdrop {
  position: absolute; inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
}

.search-modal {
  position: relative;
  width: 100%;
  max-width: 480px;
  background: rgba(15,15,15,0.95);
  border: 1px solid rgba(255,122,41,0.3);
  border-radius: 18px;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  backdrop-filter: blur(12px);
}

.search-input-wrap {
  display: flex;
  align-items: center;
  padding: 14px 18px;
  border-bottom: 1px solid rgba(255,122,41,0.15);
  gap: 10px;
}

.search-icon { font-size: 18px; opacity: 0.7; }

.search-input-wrap input {
  flex: 1;
  background: none;
  border: none;
  color: #fff;
  font-size: 16px;
  font-family: 'Inter', sans-serif;
  outline: none;
}
.search-input-wrap input::placeholder { color: rgba(255,255,255,0.3); }

.search-kbd {
  font-size: 10px;
  background: rgba(255,122,41,0.12);
  border: 1px solid rgba(255,122,41,0.3);
  border-radius: 4px;
  padding: 2px 6px;
  color: #FFA35C;
  font-family: 'Inter', sans-serif;
}

.search-results {
  max-height: 320px;
  overflow-y: auto;
}

.search-result-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 18px;
  text-decoration: none;
  color: #fff;
  transition: background 0.15s;
  cursor: pointer;
  border-bottom: 1px solid rgba(255,122,41,0.06);
}
.search-result-item:hover,
.search-result-item.active {
  background: rgba(255,122,41,0.1);
}

.search-result-icon { font-size: 20px; flex-shrink: 0; }

.search-result-info { flex: 1; min-width: 0; }

.search-result-title {
  font-family: 'Caveat', cursive;
  font-size: 18px;
  color: #FFA35C;
  font-weight: 700;
}

.search-result-meta {
  font-size: 11px;
  color: rgba(255,255,255,0.4);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.search-empty {
  padding: 24px 18px;
  text-align: center;
  color: rgba(255,255,255,0.3);
  font-size: 14px;
}

/* ── Search hint ───────────────────────────────────────────────────────────── */
.search-hint {
  position: fixed;
  bottom: 22px; left: 50%;
  transform: translateX(-50%);
  font-size: 11px;
  color: rgba(255,122,41,0.3);
  z-index: 5;
  font-family: 'Inter', sans-serif;
  display: flex;
  align-items: center;
  gap: 6px;
}
.search-hint kbd {
  font-size: 10px;
  background: rgba(255,122,41,0.08);
  border: 1px solid rgba(255,122,41,0.2);
  border-radius: 4px;
  padding: 1px 5px;
  color: #FFA35C;
}

@media (max-width: 640px) {
  .search-hint { display: none; }
}

/* ── Notes Panel (slide-out) ───────────────────────────────────────────────── */
#notes-panel {
  position: fixed;
  top: 0; right: -400px;
  width: 380px; max-width: 90vw;
  height: 100vh;
  background: rgba(10,10,10,0.96);
  border-left: 1px solid rgba(255,122,41,0.2);
  backdrop-filter: blur(12px);
  z-index: 50;
  padding: 28px 24px;
  overflow-y: auto;
  transition: right 0.3s ease;
}
#notes-panel.open { right: 0; }

#notes-panel .notes-close {
  position: absolute;
  top: 16px; right: 16px;
  background: none; border: none;
  color: var(--accent-light);
  font-size: 20px; cursor: pointer;
}

#notes-panel .notes-title {
  font-family: 'Caveat', cursive;
  font-size: 26px;
  color: var(--accent);
  font-weight: 700;
  margin-bottom: 8px;
  padding-right: 30px;
}

#notes-panel .notes-meta {
  font-size: 11px;
  color: rgba(255,255,255,0.4);
  margin-bottom: 16px;
}

#notes-panel .notes-content {
  font-size: 14px;
  line-height: 1.7;
  color: rgba(255,255,255,0.85);
  white-space: pre-wrap;
}

#notes-panel .notes-content h1,
#notes-panel .notes-content h2,
#notes-panel .notes-content h3 {
  color: var(--accent-light);
  margin-top: 16px;
  margin-bottom: 8px;
}

#notes-panel .notes-content code {
  background: rgba(255,122,41,0.1);
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 13px;
}

#notes-panel .notes-content a {
  color: var(--accent);
}

/* ── Tags bar ──────────────────────────────────────────────────────────────── */
.tag-badge {
  font-size: 9px;
  background: rgba(255,122,41,0.1);
  border: 1px solid rgba(255,122,41,0.25);
  color: var(--accent-light);
  border-radius: 8px;
  padding: 2px 6px;
  display: inline-block;
  margin-top: 2px;
}

/* ── Zoom reset button ─────────────────────────────────────────────────────── */
.zoom-reset {
  position: fixed;
  bottom: 22px; right: 80px;
  width: 32px; height: 32px;
  border-radius: 50%;
  background: rgba(255,122,41,0.08);
  border: 1px solid rgba(255,122,41,0.3);
  color: var(--accent);
  font-size: 16px;
  cursor: pointer;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}
.zoom-reset:hover {
  background: rgba(255,122,41,0.2);
  border-color: var(--accent);
}

/* ── Badge styles (mobile) ─────────────────────────────────────────────────── */
.link-card-badges {
  display: flex;
  gap: 4px;
}
.badge-new {
  font-size: 8px;
  background: rgba(52,211,153,0.15);
  border: 1px solid rgba(52,211,153,0.4);
  color: #34d399;
  border-radius: 6px;
  padding: 1px 5px;
  font-weight: 600;
  letter-spacing: 0.5px;
}
.badge-featured {
  font-size: 10px;
  color: #fbbf24;
}

/* ── Mobile search button ──────────────────────────────────────────────────── */
.mobile-search-btn {
  display: none;
  position: fixed;
  top: 18px; right: 18px;
  width: 40px; height: 40px;
  border-radius: 50%;
  background: rgba(255,122,41,0.1);
  border: 1px solid rgba(255,122,41,0.3);
  font-size: 18px;
  z-index: 16;
  cursor: pointer;
  backdrop-filter: blur(6px);
  -webkit-tap-highlight-color: transparent;
}
@media (max-width: 640px) {
  .mobile-search-btn { display: flex; align-items: center; justify-content: center; }
  .zoom-reset { display: none; }
}

/* ── Long-press hint ───────────────────────────────────────────────────────── */
.link-card-notes-hint {
  font-size: 9px;
  color: rgba(255,163,92,0.4);
  margin-top: 2px;
}

/* ── View Toggle ───────────────────────────────────────────────────────────── */
#view-toggle {
  position: fixed;
  top: 18px; right: 68px;
  z-index: 10;
  display: flex;
  gap: 6px;
}
.view-btn {
  width: 32px; height: 32px;
  border-radius: 10px;
  background: rgba(255,122,41,0.08);
  border: 1px solid rgba(255,122,41,0.25);
  color: var(--accent-light);
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  text-decoration: none;
  transition: all 0.2s;
  backdrop-filter: blur(6px);
}
.view-btn:hover,.view-btn.active {
  background: rgba(255,122,41,0.2);
  border-color: var(--accent);
}
@media (max-width: 640px) {
  #view-toggle { display: none; }
}

/* ── Site Header Strip ─────────────────────────────────────────────────────── */
#site-header-strip {
  display: none;
  position: fixed;
  top: 4px; left: 50%;
  transform: translateX(-50%);
  z-index: 11;
  align-items: center;
  gap: 8px;
  padding: 4px 16px;
}

/* ── Pinboard View ─────────────────────────────────────────────────────────── */
#pinboard-view {
  display: none;
  position: fixed; inset: 0;
  z-index: 2;
  overflow-y: auto;
  padding: 70px 24px 40px;
}
#pinboard-grid {
  columns: 4 220px;
  column-gap: 16px;
  max-width: 1200px;
  margin: 0 auto;
}
.pin-card {
  break-inside: avoid;
  margin-bottom: 16px;
  background: rgba(255,122,41,0.06);
  border: 1px solid rgba(255,122,41,0.2);
  border-radius: 16px;
  padding: 16px;
  text-decoration: none;
  color: #fff;
  display: block;
  transition: all 0.2s ease;
  cursor: pointer;
}
.pin-card:hover {
  background: rgba(255,122,41,0.12);
  border-color: rgba(255,122,41,0.5);
  transform: translateY(-2px);
}
.pin-card.featured { box-shadow: 0 0 18px rgba(255,122,41,0.2); border-color: rgba(255,122,41,0.5); }
.pin-title { font-family: 'Caveat', cursive; font-size: 20px; color: var(--accent-light); font-weight: 700; }
.pin-desc { font-size: 12px; color: #aaa; margin-top: 4px; line-height: 1.5; }
.pin-cat { font-size: 10px; color: rgba(255,163,92,0.5); text-transform: uppercase; margin-top: 8px; }
.pin-tags { margin-top: 6px; display: flex; flex-wrap: wrap; gap: 4px; }

/* ── Tag Cloud View ────────────────────────────────────────────────────────── */
#tagcloud-view {
  display: none;
  position: fixed; inset: 0;
  z-index: 2;
  align-items: center;
  justify-content: center;
}
#tagcloud-inner {
  max-width: 900px;
  width: 100%;
  padding: 80px 40px;
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  justify-content: center;
  align-items: center;
}

/* ── Link of the Day ───────────────────────────────────────────────────────── */
#link-of-day {
  display: none;
  position: fixed;
  bottom: 60px; left: 50%;
  transform: translateX(-50%);
  background: rgba(10,10,10,0.9);
  border: 1px solid rgba(255,122,41,0.3);
  border-radius: 14px;
  padding: 12px 20px;
  z-index: 10;
  backdrop-filter: blur(8px);
  text-align: center;
  max-width: 360px;
}
</style>
</head>
<body>

<!-- Wallpaper background -->
<div id="wallpaper">
  <div class="ambient-glow"></div>
  <div id="particles"></div>
</div>

<!-- Desktop mind map -->
